<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Моё резюме</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            transition: background-color 0.5s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #3498db;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .profile img:hover {
            transform: scale(1.05);
        }

        .info p {
            font-size: 18px;
            color: #34495e;
            margin: 8px 0;
        }

        #lastname {
            font-weight: bold;
            color: #2980b9;
            font-size: 22px;
        }

        .controls {
            margin-top: 20px;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            border: 1px solid #bdc3c7;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 16px;
            width: 60%;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #2980b9;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.5);
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .skills {
            margin-top: 20px;
        }

        .skills li {
            padding: 8px;
            margin: 5px 0;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .skills li:hover {
            background: #d4eaf2;
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Моё резюме</h1>
        
        <div class="profile">
            <img src="https://www.interfax.ru/ftproot/photos/photostory/2019/07/09/week4_700.jpg" alt="Фото">
            <div class="info">
                <p>Имя: <span id="firstname">Иван</span></p>
                <p>Фамилия: <span id="lastname">Попов</span></p>
                <p>Возраст: 21 год</p>
                <p>Город: Москва</p>
            </div>
        </div>

        <div class="skills">
            <h3>Навыки:</h3>
            <ul>
                <li>HTML5</li>
                <li>CSS3</li>
                <li>JavaScript</li>
                <li>Git / GitHub</li>
            </ul>
        </div>

        <div class="controls">
            <h3>Изменить фамилию:</h3>
            <input type="text" id="newLastname" placeholder="Введите новую фамилию">
            <button onclick="changeLastname()">Изменить</button>
            <br><br>
            <button onclick="changeBackground()">Случайный цвет фона</button>
        </div>
    </div>

    <script>
        function changeLastname() {
            const input = document.getElementById('newLastname');
            const lastname = document.getElementById('lastname');
            if (input.value.trim() !== '') {
                lastname.textContent = input.value;
                input.value = '';
            } else {
                alert('Введите фамилию!');
            }
        }

        function changeBackground() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
    </script>
</body>
</html>
